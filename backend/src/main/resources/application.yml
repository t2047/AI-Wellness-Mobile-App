server:
  port: 8080

spring:
  application:
    name: wellness-backend

  # Default profile uses H2 for easy local development
  # Switch to 'mysql' profile for production: --spring.profiles.active=mysql
  datasource:
    url: jdbc:h2:mem:wellnessdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
app:
  jwt:
    secret: wellness-app-jwt-secret-key-change-in-production-must-be-at-least-256-bits
    expiration-ms: 86400000  # 24 hours

# DeepSeek Chatbot Configuration
# Key is loaded from ../.env by DotenvConfig (dotenv-java).
# Falls back to DEEPSEEK_API_KEY environment variable.
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}

# Python Agent Configuration
agent:
  python:
    enabled: true
    base-url: http://localhost:5001
    scheduler-cron: "0 0 8 * * *"  # Run daily at 8 AM

---
# MySQL profile
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
