server:
  port: 8080

spring:
  application:
    name: wellness-backend

  # Default profile uses H2 for easy local development
  # Switch to 'mysql' profile for production: --spring.profiles.active=mysql
  datasource:
    url: jdbc:h2:mem:wellnessdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
app:
  jwt:
    secret: wellness-app-jwt-secret-key-change-in-production-must-be-at-least-256-bits
    expiration-ms: 86400000  # 24 hours

# AI provider for direct chatbot fallback when the Python agent is unavailable.
# Use "openai" for GPT/OpenAI API keys, or "deepseek" for DeepSeek keys.
# Do not hardcode real API keys in this file.
ai:
  provider: ${AI_PROVIDER:openai}

openai:
  api-key: ${OPENAI_API_KEY:${GPT_API_KEY:}}
  chat-url: ${OPENAI_CHAT_URL:https://api.openai.com/v1/chat/completions}
  model: ${OPENAI_MODEL:gpt-4o-mini}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:${WELLNESS_DEEPSEEK_API_KEY:}}
  chat-url: ${DEEPSEEK_CHAT_URL:https://api.deepseek.com/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

# Python Agent Configuration
agent:
  python:
    enabled: true
    base-url: http://localhost:5001
    scheduler-cron: "0 0 8 * * *"  # Run daily at 8 AM

---
# MySQL profile
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
