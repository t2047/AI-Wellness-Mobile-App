server:
  port: 8080

spring:
  application:
    name: wellness-backend

  datasource:
    # Default backend runtime uses MySQL so mvn spring-boot:run persists CA demo data.
    # Credentials come from the project-root .env or local environment variables.
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Configuration
app:
  jwt:
    # ZHAO LEI: allow a private deployment secret while retaining a local demo default.
    secret: ${JWT_SECRET:wellness-app-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000  # 24 hours

# AI provider for direct chatbot fallback when the Python agent is unavailable.
# Use "openai" for GPT/OpenAI API keys, or "deepseek" for DeepSeek keys.
# Do not hardcode real API keys in this file.
ai:
  provider: ${AI_PROVIDER:openai}

openai:
  # ZHAO LEI: DashScope exposes an OpenAI-compatible Chat Completions API.
  api-key: ${OPENAI_API_KEY:${DASHSCOPE_API_KEY:${GPT_API_KEY:}}}
  chat-url: ${OPENAI_CHAT_URL:https://api.openai.com/v1/chat/completions}
  model: ${OPENAI_MODEL:gpt-4o-mini}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:${WELLNESS_DEEPSEEK_API_KEY:}}
  chat-url: ${DEEPSEEK_CHAT_URL:https://api.deepseek.com/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

# Python Agent Configuration
agent:
  python:
    enabled: true
    base-url: http://localhost:5001
    scheduler-cron: "0 0 8 * * *"  # Run daily at 8 AM

---
# MySQL profile
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    # ZHAO LEI: credentials and optional connection overrides come from local environment variables.
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
